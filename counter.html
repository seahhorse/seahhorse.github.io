<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
    </head>
    <style>
        body {
		    background-color: #99d18f;
	    }
        div {
            width: auto;
            border: 5px solid white;
            padding: 25px;
            margin: 25px;
            background-color: #99d18f;
            text-align: center;
            color: white;
            font-family: "Helvetica";
        }
	    h1 {
            margin-block-start: 10px;
            margin-block-end: 0;
            font-size: 25px;
	    }
	    h2 {
            margin-block-start: 0px;
            margin-block-end: 0;
            font-size: 100px;
        }
	    .button {
            background-color: #b7ddb0;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
    <script type="text/javascript">
        var dinein = 0;
        var takeaway = 0;
        var toomany = "Too many people, please wait!"
        function DineInEnter() {
            if (dinein < 50) {
                dinein += 1;
                document.getElementById("dinein").innerHTML = dinein;
            }
            else {
            document.getElementById("error1").innerHTML = toomany;
            }
        };
        function DineInExit() {
            if (dinein > 0) {
                dinein -= 1;
                document.getElementById("error1").innerHTML = " ";
                document.getElementById("dinein").innerHTML = dinein;
            }
        };
        function TakeAwayEnter() {
            if (takeaway < 10) {
                takeaway += 1;
                document.getElementById("takeaway").innerHTML = takeaway;
        }
            else {
                document.getElementById("error2").innerHTML = toomany;
            }
        };
        function TakeAwayExit() {
            if (takeaway> 0) {
                takeaway -= 1;
                document.getElementById("error2").innerHTML = " ";
                document.getElementById("takeaway").innerHTML = takeaway;
            }
        };
    </script>
    
    <body>
    <div>
	<h1>Dining In Count:</h1>
	<h2><a id="dinein">0</a></h2>
	<button class="button" onClick="DineInEnter()">+</button>
	<button class="button" onClick="DineInExit()">-</button>
	<h1><a id="error1"></a></h2>
	</div>

	<div>
	<h1>Take Away Count:</h1>
	<h2> <a id="takeaway">0</a> </h2>
	<button class="button" onClick="TakeAwayEnter()">+</button>
	<button class="button" onClick="TakeAwayExit()">-</button>
	<h1><a id="error2"></a></h2>
	</div>  
    </body>
</html>
